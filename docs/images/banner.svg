<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7209b7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)" />

  <!-- Accent bar top -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#accentGrad)" />

  <!-- Decorative circles -->
  <circle cx="720" cy="40" r="60" fill="#4361ee" opacity="0.06" />
  <circle cx="750" cy="160" r="80" fill="#7209b7" opacity="0.05" />
  <circle cx="60" cy="170" r="50" fill="#4361ee" opacity="0.05" />

  <!-- Newspaper icon -->
  <g transform="translate(80, 62)" filter="url(#glow)">
    <rect x="0" y="0" width="52" height="60" rx="4" fill="none" stroke="#4361ee" stroke-width="2.5" />
    <rect x="6" y="8" width="24" height="3" rx="1" fill="#4361ee" opacity="0.9" />
    <rect x="6" y="15" width="40" height="2" rx="1" fill="#a0a0c0" opacity="0.4" />
    <rect x="6" y="20" width="38" height="2" rx="1" fill="#a0a0c0" opacity="0.35" />
    <rect x="6" y="25" width="40" height="2" rx="1" fill="#a0a0c0" opacity="0.3" />
    <rect x="6" y="32" width="18" height="22" rx="2" fill="#4361ee" opacity="0.15" />
    <rect x="28" y="32" width="18" height="2" rx="1" fill="#a0a0c0" opacity="0.3" />
    <rect x="28" y="37" width="16" height="2" rx="1" fill="#a0a0c0" opacity="0.25" />
    <rect x="28" y="42" width="18" height="2" rx="1" fill="#a0a0c0" opacity="0.25" />
    <rect x="28" y="47" width="14" height="2" rx="1" fill="#a0a0c0" opacity="0.2" />
  </g>

  <!-- Title -->
  <text x="160" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    📰 News Digest Generator
  </text>

  <!-- Tagline -->
  <text x="160" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#a0a0c0" letter-spacing="0.3">
    AI-Powered Article Categorization, Sentiment Analysis &amp; Daily Digests
  </text>

  <!-- Tech badges -->
  <g transform="translate(160, 148)">
    <rect x="0" y="0" width="64" height="22" rx="4" fill="#4361ee" opacity="0.15" stroke="#4361ee" stroke-width="1" />
    <text x="32" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4361ee" text-anchor="middle" font-weight="600">Gemma 4</text>

    <rect x="74" y="0" width="58" height="22" rx="4" fill="#4361ee" opacity="0.15" stroke="#4361ee" stroke-width="1" />
    <text x="103" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4361ee" text-anchor="middle" font-weight="600">Ollama</text>

    <rect x="142" y="0" width="60" height="22" rx="4" fill="#4361ee" opacity="0.15" stroke="#4361ee" stroke-width="1" />
    <text x="172" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4361ee" text-anchor="middle" font-weight="600">Python</text>

    <rect x="212" y="0" width="48" height="22" rx="4" fill="#4361ee" opacity="0.15" stroke="#4361ee" stroke-width="1" />
    <text x="236" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4361ee" text-anchor="middle" font-weight="600">Click</text>

    <rect x="270" y="0" width="48" height="22" rx="4" fill="#4361ee" opacity="0.15" stroke="#4361ee" stroke-width="1" />
    <text x="294" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4361ee" text-anchor="middle" font-weight="600">Rich</text>
  </g>

  <!-- Accent bar bottom -->
  <rect x="0" y="196" width="800" height="4" rx="2" fill="url(#accentGrad)" />
</svg>
